<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The London Salary Race</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:  #f8d000;
  --green: #00e070;
  --black: #080808;
  --white: #fcfcfc;
}

html { background: var(--black); overflow-x: hidden; }
body { background: var(--black); color: var(--white); font-family: 'Courier New', Courier, monospace; }

/* ── LAYOUT ───────────────────────────────────────────── */
#driver { height: 700vh; position: relative; }

#scene {
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ── HUD ──────────────────────────────────────────────── */
#hud { flex: 0 0 auto; background: #000; border-bottom: 3px solid var(--gold); }

.hud-top {
  display: flex; height: 36px; border-bottom: 1px solid #222;
}
.hud-cell {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 2px 8px; border-right: 1px solid #1a1a1a;
}
.hud-cell--wide { flex: 2; }
.hud-cell:last-child { border-right: none; }
.hud-lbl { font-size: 8px; color: #555; text-transform: uppercase; letter-spacing: .1em; }
.hud-val { font-size: 11px; font-weight: bold; color: var(--gold); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }

.hud-board { display: grid; grid-template-columns: repeat(3,1fr); }
.hud-col { border-right: 1px solid #1a1a1a; padding: 4px 8px; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
.hud-col:last-child { border-right: none; }
.rank-row { display: flex; align-items: center; gap: 5px; font-size: 9px; line-height: 1; white-space: nowrap; }
.rank-num  { color: var(--gold); width: 16px; flex-shrink: 0; font-size: 8px; }
.rank-dot  { width: 6px; height: 6px; flex-shrink: 0; }
.rank-name { color: var(--white); flex: 1; overflow: hidden; text-overflow: ellipsis; }
.rank-sal  { color: var(--green); width: 36px; text-align: right; flex-shrink: 0; }

/* ── RACE VIEWPORT ────────────────────────────────────── */
#viewport-clip { flex: 1; overflow: hidden; position: relative; }

#world {
  position: absolute; top: 0; left: 0; height: 100%;
  will-change: transform;
}
#bg-canvas {
  display: block; position: absolute; top: 0; left: 0;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
#runners-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* ── RUNNERS ──────────────────────────────────────────── */
.runner-wrap { position: absolute; cursor: pointer; will-change: left; }
.runner-wrap svg { display: block; image-rendering: pixelated; overflow: visible; }

@keyframes leg-swing {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}
.runner-wrap.racing .leg-f { animation: leg-swing .28s steps(2) infinite; }
.runner-wrap.racing .leg-b { animation: leg-swing .28s steps(2) infinite reverse; }
.runner-wrap.racing .arm-f { animation: leg-swing .28s steps(2) infinite reverse; }

/* ── LANE LABELS ──────────────────────────────────────── */
#lane-labels {
  position: absolute; top: 0; left: 0; height: 100%;
  pointer-events: none; z-index: 10;
  transition: opacity .4s;
}
.lane-tag {
  position: absolute; left: 0;
  display: flex; align-items: center; gap: 3px;
  padding: 0 5px 0 0; background: rgba(0,0,0,.78); height: 18px;
}
.lane-pip  { width: 4px; height: 100%; flex-shrink: 0; }
.lane-name { font-size: 7px; color: var(--white); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; opacity: .85; }

/* ── TICKER ───────────────────────────────────────────── */
#ticker {
  flex: 0 0 auto; background: #000; border-top: 3px solid var(--gold);
  display: flex; align-items: flex-start; padding: 10px 18px; gap: 12px; min-height: 78px;
}
#ticker-badge {
  flex-shrink: 0; padding: 3px 8px; background: var(--gold); color: #000;
  font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: .1em;
  white-space: nowrap; margin-top: 1px;
}
#ticker-body { font-size: 10px; line-height: 1.7; letter-spacing: .03em; flex: 1; transition: opacity .25s; }
#ticker-body.fade { opacity: 0; }
.source-link {
  flex-shrink: 0; font-size: 8px; color: #555; text-decoration: none;
  text-transform: uppercase; letter-spacing: .07em; align-self: flex-start; margin-top: 2px;
}
.source-link:hover { color: var(--gold); }
.hud-source {
  font-size: 9px; font-weight: bold; color: var(--gold); text-decoration: none;
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid #333;
}
.hud-source:hover { color: var(--white); border-bottom-color: var(--white); }

/* ── TOOLTIP ──────────────────────────────────────────── */
#tooltip {
  position: fixed; z-index: 100; background: #000; border: 2px solid var(--gold);
  padding: 8px 12px; display: none; pointer-events: none;
  font-size: 9px; text-transform: uppercase; letter-spacing: .07em; line-height: 1.8;
}
.tt-name { color: var(--gold); font-size: 10px; }
.tt-sal  { color: var(--green); }
.tt-gain { color: #aaa; }

/* ── PROGRESS PIPS ────────────────────────────────────── */
#pips {
  position: fixed; right: 12px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px; z-index: 50;
}
.pip { width: 8px; height: 8px; background: #333; cursor: pointer; }
.pip.active { background: var(--gold); }

/* ── PODIUM SCENE ─────────────────────────────────────── */
#podium-scene {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: #000; z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px 16px;
  overflow-y: auto;
  opacity: 0; pointer-events: none; transition: opacity .5s;
}
#podium-scene.visible { opacity: 1; pointer-events: auto; }

.pod-title {
  font-size: 11px; font-weight: bold; color: var(--gold);
  text-transform: uppercase; letter-spacing: .12em;
  border-bottom: 2px solid var(--gold); padding-bottom: 8px;
  width: 100%; text-align: center; margin-bottom: 16px;
}

.pod-stage {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 4px; width: 100%; max-width: 500px; margin-bottom: 16px;
}

.pod-slot {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; flex: 1;
}
.pod-sprite { display: flex; justify-content: center; }
.pod-rolename {
  font-size: 8px; color: var(--white); text-transform: uppercase;
  letter-spacing: .06em; text-align: center; white-space: nowrap;
}
.pod-salary { font-size: 10px; font-weight: bold; text-align: center; }
.pod-block {
  width: 100%; display: flex; align-items: center; justify-content: center;
}
.pod-rank-lbl {
  font-size: 9px; font-weight: bold; color: #000;
  text-transform: uppercase; letter-spacing: .08em;
}

.pod-rest { width: 100%; max-width: 480px; border-top: 1px solid #222; padding-top: 10px; }
.pod-rest-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid #111;
  font-size: 9px;
}
.rest-rank { color: var(--gold); width: 18px; flex-shrink: 0; }
.rest-dot  { width: 7px; height: 7px; flex-shrink: 0; }
.rest-name { color: var(--white); flex: 1; text-transform: uppercase; letter-spacing: .04em; }
.rest-sal  { color: var(--green); width: 36px; text-align: right; flex-shrink: 0; }
.rest-gain { color: #666; font-size: 8px; width: 90px; text-align: right; flex-shrink: 0; }

.pod-source {
  margin-top: 14px; font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: .07em;
}
.pod-source a { color: #666; text-decoration: none; }
.pod-source a:hover { color: var(--gold); }
</style>
</head>
<body>

<div id="driver">
  <div id="scene">
    <div id="hud">
      <div class="hud-top">
        <div class="hud-cell">
          <span class="hud-lbl">Source</span>
          <a class="hud-source" href="https://app.welcometothejungle.com/salaries" target="_blank" rel="noreferrer">WTTJ SALARIES</a>
        </div>
        <div class="hud-cell hud-cell--wide">
          <span class="hud-lbl">Stage</span>
          <span class="hud-val" id="hud-stage">STARTING GUN</span>
        </div>
        <div class="hud-cell">
          <span class="hud-lbl">Year</span>
          <span class="hud-val" id="hud-year">0</span>
        </div>
        <div class="hud-cell">
          <span class="hud-lbl">Lead</span>
          <span class="hud-val" id="hud-lead">—</span>
        </div>
      </div>
      <div class="hud-board" id="hud-board"></div>
    </div>

    <div id="viewport-clip">
      <div id="world">
        <canvas id="bg-canvas"></canvas>
        <div id="runners-layer"></div>
      </div>
      <div id="lane-labels"></div>
      <div id="podium-scene"></div>
    </div>

    <div id="ticker">
      <span id="ticker-badge">Start</span>
      <span id="ticker-body">Nine London roles line up at the starting gun. Who pulls away — and when?</span>
      <a class="source-link" href="https://app.welcometothejungle.com/salaries" target="_blank" rel="noreferrer">▶ wttj salaries</a>
    </div>
  </div>
</div>

<div id="pips">
  <div class="pip active" data-beat="0" title="Starting Gun"></div>
  <div class="pip" data-beat="1" title="Year 3"></div>
  <div class="pip" data-beat="2" title="Year 5"></div>
  <div class="pip" data-beat="3" title="Year 9"></div>
  <div class="pip" data-beat="4" title="Podium"></div>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-sal"  id="tt-sal"></div>
  <div class="tt-gain" id="tt-gain"></div>
</div>

<script>
/* ── DATA ─────────────────────────────────────────────── */
const ROLES = [
  { name:"Generalist Mktg",   tag:"GEN MKT",  color:"#ff6a3d", medians:[30000,32000,34000,45000,47000,62000,66000,68000,70000,93500]  },
  { name:"Finance Ops",       tag:"FIN OPS",  color:"#c0c0c0", medians:[28000,32500,37000,50000,52500,79000,81500,84000,89000,94500]  },
  { name:"Sales Ops",         tag:"SALES",    color:"#f3d338", medians:[30000,45000,47500,56000,60000,74000,78000,82000,84500,112000] },
  { name:"Risk & Compliance", tag:"RISK",     color:"#0bbb63", medians:[31500,35000,38000,57000,59500,77000,81000,86000,90000,110000] },
  { name:"Corporate Finance", tag:"CORP FIN", color:"#e83030", medians:[28000,37000,47500,68000,70500,82000,84000,88000,92500,115000] },
  { name:"Product Mgmt",      tag:"PROD",     color:"#4080f0", medians:[29500,50000,54000,65000,69000,86000,92000,97000,104000,112000]},
  { name:"Legal",             tag:"LEGAL",    color:"#ff9a3c", medians:[35000,38000,40000,60000,62000,85000,88000,91000,94500,114000] },
  { name:"Data Analysis",     tag:"DATA/BI",  color:"#2cc7ff", medians:[33000,40000,45000,54500,59500,68000,72000,76000,80000,95000]  },
  { name:"Backend Eng",       tag:"BACKEND",  color:"#b070ff", medians:[44000,55000,61500,66000,71500,85000,89000,93000,97000,106000] },
];

/* Beats: [start-line, yr3, yr5, yr9, podium] */
const BEATS = [
  { stage:"STARTING GUN",        badge:"Start",   year:0,    body:"Nine London roles line up at the starting line. At year zero the spread is barely £16k — the gun fires, the race begins." },
  { stage:"FIRST BEND",          badge:"Year 3",  year:3,    body:"Three years in, Corporate Finance, Product Mgmt, and Legal break away. The field has already split into two groups." },
  { stage:"MID-CAREER BREAKAWAY",badge:"Year 5",  year:5,    body:"The breakaway is locked in. Tech and Finance roles have pulled £35–55k ahead of slower climbers. Trajectory now beats starting salary." },
  { stage:"FINISH LINE",         badge:"Year 9",  year:9,    body:"Corporate Finance crosses the line at £115k — nearly double its starting salary. Six roles clear the finish; three trail behind." },
  { stage:"FINAL STANDINGS",     badge:"Podium",  year:9,    isPodium:true, body:"The race is over. Nine roles, nine trajectories. The pack that looked identical at the gun finished £21k apart." },
];

/* Progress thresholds for each beat */
const THRESHOLDS = [0, 0.22, 0.47, 0.70, 0.88];

/* Salary that marks the finish line — 6 of 9 roles will cross it */
const FINISH_SAL = 105000;

/* ── GLOBALS ──────────────────────────────────────────── */
let VW, SCENE_H, WORLD_W, TRACK_TOP, LANE_H;
let salToX, BEAT_POS, FINISH_X, START_LINE_X;
let runnerEls = [], currentBeat = 0;
let tipActiveRole = null, tipActiveYear = 0;
let rafPending = false;
let highWater = 0; /* highest progress value seen this session */

/* ── INIT ─────────────────────────────────────────────── */
function init() {
  VW = window.innerWidth;
  const hudH   = document.getElementById('hud').offsetHeight;
  const tickH  = document.getElementById('ticker').offsetHeight;
  SCENE_H = window.innerHeight - hudH - tickH;

  WORLD_W = Math.round(VW * 2.5);

  const PAD_L = Math.round(VW * 0.12);
  const PAD_R = Math.round(VW * 0.16);
  salToX = sal => PAD_L + Math.max(0, Math.min(1, (sal - 20000) / 110000)) * (WORLD_W - PAD_L - PAD_R);

  FINISH_X = salToX(FINISH_SAL);

  /* Track geometry */
  TRACK_TOP = Math.round(SCENE_H * 0.58);
  LANE_H    = (SCENE_H - TRACK_TOP) / ROLES.length;

  /* World element */
  const world = document.getElementById('world');
  world.style.width  = WORLD_W + 'px';
  world.style.height = SCENE_H + 'px';

  /* Pre-compute beat positions for each role */
  const LABEL_W = Math.round(VW * 0.11) + 8; /* ≈ lane-label width */
  START_LINE_X = LABEL_W + 4;                /* visible start line on canvas */
  const START_X = START_LINE_X - 20;         /* runners start behind the line */

  BEAT_POS = [
    /* Beat 0: starting line — all runners together */
    ROLES.map(() => START_X),

    /* Beat 1: Year 3 */
    ROLES.map(r => salToX(r.medians[3])),

    /* Beat 2: Year 5 */
    ROLES.map(r => salToX(r.medians[5])),

    /* Beat 3: Year 9 — top roles cross the finish line */
    ROLES.map(r => {
      const sal = r.medians[9];
      if (sal >= FINISH_SAL) {
        /* push proportionally past the line */
        return FINISH_X + 18 + (sal - FINISH_SAL) / 1800;
      }
      return salToX(sal);
    }),

    /* Beat 4: Podium — same as beat 3 (scene is hidden) */
    ROLES.map(r => salToX(r.medians[9])),
  ];

  /* Canvas — drawn after BEAT_POS so start line position is available */
  const canvas = document.getElementById('bg-canvas');
  canvas.width  = WORLD_W;
  canvas.height = SCENE_H;
  drawBG(canvas);

  buildRunners();
  buildLaneLabels();
  buildPodium();

  /* Snap to initial state */
  applyFrame(0, false);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ── BACKGROUND ───────────────────────────────────────── */
function rng(seed) {
  let s = seed >>> 0;
  return () => {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 0xffffffff;
  };
}

function drawBG(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width, H = canvas.height;

  const SKY_BOT    = Math.round(H * 0.27);
  const STAND_BOT  = Math.round(H * 0.44);
  const CROWD_BOT  = Math.round(H * 0.52);
  const INFIELD_BOT = Math.round(H * 0.58); /* same as TRACK_TOP */

  /* sky */
  ctx.fillStyle = '#5c94fc';
  ctx.fillRect(0, 0, W, SKY_BOT);

  /* chunky pixel clouds */
  const cr = rng(77);
  ctx.fillStyle = '#a8ccff';
  for (let i = 0; i < Math.ceil(W / 280); i++) {
    const cx = Math.round(cr() * W);
    const cy = Math.round(cr() * SKY_BOT * 0.6);
    const cw = 48 + Math.round(cr() * 72);
    ctx.fillRect(cx, cy, cw, 10);
    ctx.fillRect(cx + 8, cy - 8, cw - 16, 10);
    ctx.fillRect(cx + 4, cy + 8, cw - 8, 6);
  }
  /* stars */
  ctx.fillStyle = '#fcfcfc';
  const sr = rng(13);
  for (let i = 0; i < Math.ceil(W / 55); i++) {
    ctx.fillRect(Math.round(sr() * W), Math.round(sr() * SKY_BOT * 0.5), 2, 2);
  }

  /* stands */
  ctx.fillStyle = '#14147c';
  ctx.fillRect(0, SKY_BOT, W, STAND_BOT - SKY_BOT);
  const rowH = 7;
  const seatCols = ['#18189a','#10108a','#1e1ea8','#0c0c72','#22228e'];
  for (let y = SKY_BOT; y < STAND_BOT; y += rowH) {
    ctx.fillStyle = seatCols[Math.floor((y - SKY_BOT) / rowH) % seatCols.length];
    ctx.fillRect(0, y, W, rowH - 1);
    ctx.fillStyle = 'rgba(255,255,255,.1)';
    for (let x = 0; x < W; x += 10) ctx.fillRect(x, y, 1, rowH - 1);
  }

  /* crowd */
  ctx.fillStyle = '#0c0c14';
  ctx.fillRect(0, STAND_BOT, W, CROWD_BOT - STAND_BOT);
  const cc = ['#e04040','#40a0e0','#f8d000','#808080','#f0a0a0','#70c0f0','#fcfcfc','#e08000','#50c050'];
  const pr = rng(42);
  for (let x = 0; x < W; x += 4) {
    for (let y = STAND_BOT; y < CROWD_BOT; y += 4) {
      if (pr() > 0.32) {
        ctx.fillStyle = cc[Math.floor(pr() * cc.length)];
        ctx.fillRect(x, y, 4, 4);
      }
    }
  }

  /* infield */
  ctx.fillStyle = '#087808';
  ctx.fillRect(0, CROWD_BOT, W, INFIELD_BOT - CROWD_BOT);
  for (let x = 0; x < W; x += 24) {
    ctx.fillStyle = x % 48 === 0 ? '#0a9a0a' : '#076606';
    ctx.fillRect(x, CROWD_BOT, 12, INFIELD_BOT - CROWD_BOT);
  }

  /* track lanes */
  for (let i = 0; i < ROLES.length; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#c86020' : '#b85820';
    ctx.fillRect(0, INFIELD_BOT + i * LANE_H, W, LANE_H);
  }

  /* dashed lane lines */
  ctx.setLineDash([10, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= ROLES.length; i++) {
    const y = Math.round(INFIELD_BOT + i * LANE_H);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  /* salary grid + labels */
  [30,50,70,90,110].forEach(k => {
    const x = Math.round(salToX(k * 1000));
    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 1; ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(x, INFIELD_BOT); ctx.lineTo(x, H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('£' + k + 'k', x, INFIELD_BOT - 4);
  });

  /* finish line */
  ctx.fillStyle = '#fcfcfc';
  for (let y = INFIELD_BOT; y < H; y += 8) ctx.fillRect(FINISH_X - 2, y, 4, 4);
  ctx.fillStyle = '#f8d000'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('FINISH', FINISH_X + 6, INFIELD_BOT - 4);

  /* starting white line */
  const startX = Math.round(START_LINE_X);
  ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(startX, INFIELD_BOT); ctx.lineTo(startX, H); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('START', startX, INFIELD_BOT - 4);
}

/* ── RUNNERS ──────────────────────────────────────────── */
function buildRunners() {
  const layer = document.getElementById('runners-layer');
  layer.innerHTML = '';
  runnerEls = [];

  ROLES.forEach((role, i) => {
    const laneCenter = TRACK_TOP + (i + 0.5) * LANE_H;
    const spriteH = Math.min(LANE_H * 0.88, 28);
    const scale = spriteH / 30;

    const wrap = document.createElement('div');
    wrap.className = 'runner-wrap racing';
    wrap.style.top  = (laneCenter - spriteH * 0.72) + 'px';
    wrap.style.left = BEAT_POS[0][i] + 'px';

    wrap.appendChild(spriteEl(role.color, scale));

    wrap.addEventListener('pointerenter', e => showTip(e, role, i));
    wrap.addEventListener('pointermove',  e => moveTip(e));
    wrap.addEventListener('pointerleave', hideTip);

    layer.appendChild(wrap);
    runnerEls.push({ el: wrap, role });
  });
}

function spriteEl(color, scale) {
  const ns = 'http://www.w3.org/2000/svg';
  const W = Math.round(22 * scale), H = Math.round(30 * scale);
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.setAttribute('viewBox', '0 0 22 30');
  svg.style.display = 'block'; svg.style.overflow = 'visible';

  const skin = '#f8c890', shoe = '#303030', short = '#e8e8f0';
  function r(x,y,w,h,fill,cls) {
    const el = document.createElementNS(ns,'rect');
    el.setAttribute('x',x); el.setAttribute('y',y);
    el.setAttribute('width',w); el.setAttribute('height',h);
    el.setAttribute('fill',fill);
    if (cls) el.setAttribute('class',cls);
    svg.appendChild(el);
  }
  const ell = document.createElementNS(ns,'ellipse');
  ell.setAttribute('cx',10); ell.setAttribute('cy',29);
  ell.setAttribute('rx',8);  ell.setAttribute('ry',2);
  ell.setAttribute('fill','rgba(0,0,0,.3)');
  svg.appendChild(ell);

  r(4, 20, 4, 8, shoe, 'leg-b');
  r(3, 17, 3, 6, short);
  r(11,17, 3, 6, short);
  r(11,20, 4, 8, shoe, 'leg-f');
  r(4,  8,14,12, color);
  r(4, 17,14, 4, short);
  r(9,  0, 8, 8, skin);
  r(8, -2, 3, 4, '#1a1a2e');
  r(15, 3, 2, 2, '#1a1a1a');
  r(1, 10, 4, 4, skin, 'arm-b');
  r(17, 9, 4, 4, skin, 'arm-f');
  return svg;
}

/* ── LANE LABELS ──────────────────────────────────────── */
function buildLaneLabels() {
  const container = document.getElementById('lane-labels');
  container.innerHTML = '';
  container.style.height = SCENE_H + 'px';

  ROLES.forEach((role, i) => {
    const cy = TRACK_TOP + (i + 0.5) * LANE_H;
    const tag = document.createElement('div');
    tag.className = 'lane-tag';
    tag.style.top = (cy - 9) + 'px';
    const pip = document.createElement('div');
    pip.className = 'lane-pip'; pip.style.background = role.color;
    const nm  = document.createElement('span');
    nm.className = 'lane-name'; nm.textContent = role.tag;
    tag.appendChild(pip); tag.appendChild(nm);
    container.appendChild(tag);
  });
}

/* ── PODIUM SCENE ─────────────────────────────────────── */
function buildPodium() {
  const sorted = [...ROLES].map(r => ({ ...r, med: r.medians[9] }))
    .sort((a,b) => b.med - a.med);

  const top3 = sorted.slice(0,3);
  const rest  = sorted.slice(3);

  /* podium order: 2nd left, 1st centre, 3rd right */
  const order = [top3[1], top3[0], top3[2]];
  const heights= [80, 120, 60];
  const colors = ['#a0a0a0','#f8d000','#cd7f32'];
  const labels = ['2ND','1ST','3RD'];
  const spriteScale = 1.6;

  function svgStr(color) {
    const W = Math.round(22*spriteScale), H = Math.round(30*spriteScale);
    const skin='#f8c890',shoe='#303030',short='#e8e8f0';
    function rr(x,y,w,h,fill) { return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}"/>`; }
    return `<svg width="${W}" height="${H}" viewBox="0 0 22 30" style="display:block;overflow:visible;image-rendering:pixelated">
      <ellipse cx="10" cy="29" rx="8" ry="2" fill="rgba(0,0,0,.3)"/>
      ${rr(4,20,4,8,shoe)}${rr(3,17,3,6,short)}${rr(11,17,3,6,short)}${rr(11,20,4,8,shoe)}
      ${rr(4,8,14,12,color)}${rr(4,17,14,4,short)}
      ${rr(9,0,8,8,skin)}${rr(8,-2,3,4,'#1a1a2e')}<rect x="15" y="3" width="2" height="2" fill="#1a1a1a"/>
      ${rr(1,10,4,4,skin)}${rr(17,9,4,4,skin)}
    </svg>`;
  }

  const podHTML = `
    <div class="pod-title">FINAL STANDINGS — YEAR 9</div>
    <div class="pod-stage">
      ${order.map((role,i) => `
        <div class="pod-slot">
          <div class="pod-sprite">${svgStr(role.color)}</div>
          <div class="pod-rolename">${role.name}</div>
          <div class="pod-salary" style="color:${colors[i]}">£${Math.round(role.med/1000)}k</div>
          <div class="pod-block" style="height:${heights[i]}px;background:${colors[i]}">
            <span class="pod-rank-lbl">${labels[i]}</span>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="pod-rest">
      ${rest.map((role,i) => `
        <div class="pod-rest-row">
          <span class="rest-rank">${i+4}.</span>
          <div class="rest-dot" style="background:${role.color}"></div>
          <span class="rest-name">${role.name}</span>
          <span class="rest-sal">£${Math.round(role.med/1000)}k</span>
          <span class="rest-gain">+£${Math.round((role.med-role.medians[0])/1000)}k</span>
        </div>
      `).join('')}
    </div>
    <div class="pod-source">Source: <a href="https://app.welcometothejungle.com/salaries" target="_blank" rel="noreferrer">Welcome to the Jungle · London Salaries</a></div>
  `;
  document.getElementById('podium-scene').innerHTML = podHTML;
}

/* ── INTERPOLATION ────────────────────────────────────── */
function lerp(a,b,t) { return a + (b-a) * t; }
function easeInOut(t) { return t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

function getPositions(progress, virgin) {
  let pos;
  for (let i = 0; i < THRESHOLDS.length - 1; i++) {
    if (progress <= THRESHOLDS[i+1]) {
      const seg = (progress - THRESHOLDS[i]) / (THRESHOLDS[i+1] - THRESHOLDS[i]);
      const t   = easeInOut(Math.max(0, Math.min(1, seg)));
      pos = ROLES.map((_,ri) => lerp(BEAT_POS[i][ri], BEAT_POS[i+1][ri], t));
      break;
    }
  }
  if (!pos) pos = [...BEAT_POS[BEAT_POS.length - 1]];
  /* Clamp to finish line unless this is a fresh forward advance (never-before-seen progress) */
  if (!virgin) pos = pos.map(x => Math.min(x, FINISH_X));
  return pos;
}

/* ── CAMERA — always keeps ALL runners on screen ─────── */
function computeCamera(positions) {
  const LABEL_W  = Math.round(VW * 0.11) + 12;
  const RIGHT_PAD = 45;
  const left  = Math.min(...positions);
  const right = Math.max(...positions);

  /* anchor to leftmost runner */
  let cam = Math.max(0, left - LABEL_W);
  /* shift right if rightmost would clip */
  if (right + RIGHT_PAD > cam + VW) cam = right + RIGHT_PAD - VW;

  return Math.max(0, Math.min(WORLD_W - VW, cam));
}

/* ── FRAME UPDATE (called every scroll tick) ──────────── */
function applyFrame(progress, updateBeat) {
  const virgin = progress > highWater; /* true only when reaching new territory forward */
  highWater = Math.max(highWater, progress);

  const beatIdx  = getBeat(progress);
  const isPodium = !!BEATS[beatIdx].isPodium;

  /* Show/hide podium — fade-to-black effect via #podium-scene background:#000 */
  document.getElementById('podium-scene').classList.toggle('visible', isPodium);
  document.getElementById('lane-labels').style.opacity = isPodium ? '0' : '1';

  if (!isPodium) {
    /* Move runners directly — no CSS transition */
    const pos = getPositions(progress, virgin);
    runnerEls.forEach(({ el }, ri) => { el.style.left = pos[ri] + 'px'; });
    /* Camera tracks the spread */
    const cam = computeCamera(pos);
    document.getElementById('world').style.transform = `translateX(${-cam}px)`;
    tipActiveYear = BEATS[beatIdx].year ?? 0;
  }

  /* Update HUD / ticker only when beat changes */
  if (updateBeat && beatIdx !== currentBeat) {
    currentBeat = beatIdx;
    updateHUD(BEATS[beatIdx]);
    updateTicker(BEATS[beatIdx], beatIdx);
    updatePips(beatIdx);
  }
}

/* ── HUD ──────────────────────────────────────────────── */
function updateHUD(beat) {
  document.getElementById('hud-stage').textContent = beat.stage;
  document.getElementById('hud-year').textContent  = beat.year ?? '—';

  const yr = beat.year ?? 0;
  const sorted = ROLES.map(r => ({ ...r, med: r.medians[yr] }))
    .sort((a,b) => b.med - a.med);
  document.getElementById('hud-lead').textContent = '£' + Math.round(sorted[0].med/1000) + 'k';

  const cols = [sorted.slice(0,3), sorted.slice(3,6), sorted.slice(6,9)];
  document.getElementById('hud-board').innerHTML = cols.map(col => `
    <div class="hud-col">${col.map(r => `
      <div class="rank-row">
        <span class="rank-num">${sorted.indexOf(r)+1}.</span>
        <div class="rank-dot" style="background:${r.color}"></div>
        <span class="rank-name">${r.tag}</span>
        <span class="rank-sal">£${Math.round(r.med/1000)}k</span>
      </div>`).join('')}
    </div>`).join('');
}

/* ── TICKER ───────────────────────────────────────────── */
function updateTicker(beat, idx) {
  document.getElementById('ticker-badge').textContent = beat.badge;
  const body = document.getElementById('ticker-body');
  body.classList.add('fade');
  setTimeout(() => { body.textContent = beat.body; body.classList.remove('fade'); }, 260);
}

function updatePips(beatIdx) {
  document.querySelectorAll('.pip').forEach((p,i) => p.classList.toggle('active', i===beatIdx));
}

/* ── SCROLL ───────────────────────────────────────────── */
function getBeat(progress) {
  let idx = 0;
  for (let i = THRESHOLDS.length-1; i >= 0; i--) {
    if (progress >= THRESHOLDS[i]) { idx = i; break; }
  }
  return idx;
}

function onScroll() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    const driver = document.getElementById('driver');
    const max    = driver.offsetHeight - window.innerHeight;
    const prog   = Math.max(0, Math.min(1, window.scrollY / max));
    applyFrame(prog, true);
  });
}

/* ── TOOLTIP ──────────────────────────────────────────── */
function showTip(e, role, idx) {
  const tip = document.getElementById('tooltip');
  const yr  = tipActiveYear;
  const med = role.medians[yr] ?? role.medians.at(-1);
  const gain= med - role.medians[0];
  document.getElementById('tt-name').textContent = role.name.toUpperCase();
  document.getElementById('tt-sal').textContent  = `£${med.toLocaleString()} MEDIAN (YEAR ${yr})`;
  document.getElementById('tt-gain').textContent = `+£${gain.toLocaleString()} SINCE YEAR 0`;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const tip = document.getElementById('tooltip');
  tip.style.left = Math.min(e.clientX+14, window.innerWidth-tip.offsetWidth-8) + 'px';
  tip.style.top  = Math.max(e.clientY-68, 8) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display='none'; }

/* ── PIPS ─────────────────────────────────────────────── */
document.querySelectorAll('.pip').forEach(pip => {
  pip.addEventListener('click', () => {
    const max    = document.getElementById('driver').offsetHeight - window.innerHeight;
    const target = THRESHOLDS[+pip.dataset.beat] + 0.01;
    window.scrollTo({ top: Math.round(target * max), behavior: 'smooth' });
  });
});

/* ── BOOT ─────────────────────────────────────────────── */
window.addEventListener('scroll', onScroll, { passive: true });
window.addEventListener('resize', () => { highWater = 0; init(); });
init();
updateHUD(BEATS[0]);
updateTicker(BEATS[0], 0);
</script>
</body>
